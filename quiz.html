<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《三隻小豬》編劇大挑戰</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-color: #333333;
            --btn-bg: #f1f3f5;
            --btn-hover: #e9ecef;
            --correct-color: #40c057;
            --wrong-color: #fa5252;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        #game-container {
            background-color: var(--card-bg);
            max-width: 600px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: left;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            font-size: 24px;
            border-bottom: 2px dashed var(--primary-color);
            padding-bottom: 15px;
        }

        #progress {
            text-align: center;
            font-weight: bold;
            color: #868e96;
            margin-bottom: 20px;
            font-size: 14px;
        }

        #act-title {
            font-size: 20px;
            font-weight: bold;
            color: #228be6;
            margin-bottom: 10px;
        }

        #scenario {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #e7f5ff;
            border-radius: 8px;
            border-left: 5px solid #228be6;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--btn-bg);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .option-btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            transform: none;
        }

        .option-btn.correct {
            background-color: #d3f9d8;
            border-color: var(--correct-color);
            color: #2b8a3e;
        }

        .option-btn.wrong {
            background-color: #ffe3e3;
            border-color: var(--wrong-color);
            color: #c92a2a;
        }

        #feedback-container {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            animation: fadeIn 0.5s;
        }

        #feedback-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #explanation {
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .next-btn:hover {
            background-color: #fa5252;
        }

        #end-screen {
            display: none;
            text-align: center;
        }

        #end-screen h2 {
            color: var(--correct-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>🎬 《三隻小豬》編劇大挑戰</h1>
        
        <div id="game-content">
            <div id="progress">幕次： 1 / 5</div>
            <div id="act-title">【第一幕：開端】</div>
            <div id="scenario">載入中...</div>
            
            <div class="options-container" id="options">
                <!-- 選項按鈕會透過 JS 生成 -->
            </div>

            <div id="feedback-container">
                <div id="feedback-title"></div>
                <div id="explanation"></div>
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一幕 ➡️</button>
            </div>
        </div>

        <div id="end-screen">
            <h2>🎉 殺青啦！恭喜完成劇本！</h2>
            <p>你已經成功掌握了故事山的五個結構：從開端、發展、高潮、下降，到最後的結局。</p>
            <p>準備好去寫你的好萊塢大片了嗎？</p>
            <button class="next-btn" style="margin-top: 20px;" onclick="restartGame()">🔄 再玩一次</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                act: "【第一幕：開端（Exposition）】",
                scenario: "你現在是《三隻小豬》的編劇。在電影開場的前 5 分鐘，你必須先向觀眾交代哪些「最基礎的情報」，後續大野狼出現時，劇情才推動得下去？",
                options: [
                    "(A) 小豬們躲在床底下發抖，等大野狼吹房子吹到累了，自己默默回家。",
                    "(B) 揭開大野狼悲慘的童年往事，說明他為何對豬肉如此痴迷。",
                    "(C) 豬媽媽要求三兄弟離家獨立，從中刻畫出老大、老二的「貪玩懶惰」與老三「勤奮踏實」的強烈對比。"
                ],
                correct: 2,
                explanation: "💡 <b>詳解：</b> 如果觀眾不知道老三比較勤奮、老大老二很懶，後面蓋出不同材質的房子就會顯得毫無邏輯，也無法對比出最後的結局。"
            },
            {
                act: "【第二幕：發展（Rising Action）】",
                scenario: "電影演到 15 分鐘左右，為了讓故事產生危機感與節奏變化，身為編劇的你會讓主角們遭遇什麼樣的狀況？",
                options: [
                    "(A) 大野狼接連吹垮了茅草屋和木屋，豬大哥和豬二哥只能一路尖叫，逃向豬小弟的磚窯屋。",
                    "(B) 大野狼吃到一口壞掉的茅草，引發嚴重腸胃炎，被送往森林醫院急救。",
                    "(C) 三隻小豬為了紅磚屋的窗簾顏色，在客廳裡大吵一架，最後由豬媽媽出面平息了這場紛爭。"
                ],
                correct: 0,
                explanation: "💡 <b>詳解：</b> 這就是典型的「情節升溫」。透過反派接連破壞主角的防禦，挑戰越來越大，把主角們逼到退無可退的絕境。<br><br><small><i>選項 B 會讓危機提早解除；選項 C 雖有衝突，但不是推動故事主線的核心挑戰。</i></small>"
            },
            {
                act: "【第三幕：高潮（Climax）】",
                scenario: "劇情來到最緊張的階段！編劇必須在這裡安排一個「決定性的處境」，讓主角面對最大挑戰，並一次性解決大野狼的危機。你會怎麼寫？",
                options: [
                    "(A) 豬大哥和豬小弟躲在床底下發抖，等大野狼吹房子吹到累了，自己默默回家。",
                    "(B) 豬大哥打電話報警，森林警察迅速趕到，把大野狼上銬帶走。",
                    "(C) 大野狼吹不倒磚窯屋，決定爬煙囪潛入；豬小弟見狀，立刻在壁爐燒開一鍋滾水等著他。"
                ],
                correct: 2,
                explanation: "💡 <b>詳解：</b> 「高潮」必須是主角親自面對危機，並運用他的智慧或力量（燒滾水）迎擊。這是全劇最緊張的轉捩點！<br><br><small><i>選項 A 太過被動；選項 B 依靠外部力量，無法展現主角成長。</i></small>"
            },
            {
                act: "【第四幕：下降（Falling Action）】",
                scenario: "碰！大野狼掉進滾水裡。觀眾的心跳飆到 180 後，現在準備要慢慢收尾了。在這段「緩解期」，你要怎麼設計劇情走向結局？",
                options: [
                    "(A) 大野狼燙到尾巴，慘叫著逃回森林；三隻小豬癱坐在地上喘氣，慶幸自己活了下來。",
                    "(B) 大野狼剛逃跑，門外突然又出現了一隻更可怕的霸王龍準備吃掉他們！",
                    "(C) 畫面直接切黑，跳到十年後三隻小豬變成房地產大亨。"
                ],
                correct: 0,
                explanation: "💡 <b>詳解：</b> 高潮過後需要給觀眾和角色喘息的空間。交代大野狼的敗退和主角們平復心情，是完美過渡到結局的必要步驟。<br><br><small><i>選項 B 破壞了緩解期；選項 C 節奏太跳躍，缺少善後情緒。</i></small>"
            },
            {
                act: "【第五幕：結局（Resolution）】",
                scenario: "電影已經到了結尾階段，身為編劇的你，除了交代小豬們平安無事，必須透過這場危機向觀眾傳遞什麼「隱含的啟示」？",
                options: [
                    "(A) 大野狼自食惡果的結局，帶出「凡事三思而後行」的重要。",
                    "(B) 老大和老二對豬小弟道歉，承認偷懶差點害死自己，帶出「勤勉踏實才能抵禦風險」的意義。",
                    "(C) 三隻小豬應該更孝順豬媽媽，帶出孝順的重要。"
                ],
                correct: 1,
                explanation: "💡 <b>詳解：</b> 結局的雙重任務是「交代下場」加上「傳遞意義」。老大老二的覺醒，正是這個故事流傳百年的核心啟示。"
            }
        ];

        let currentQuestionIndex = 0;

        const progressEl = document.getElementById('progress');
        const actTitleEl = document.getElementById('act-title');
        const scenarioEl = document.getElementById('scenario');
        const optionsContainer = document.getElementById('options');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackTitleEl = document.getElementById('feedback-title');
        const explanationEl = document.getElementById('explanation');
        const gameContent = document.getElementById('game-content');
        const endScreen = document.getElementById('end-screen');

        function loadQuestion() {
            const currentQ = questions[currentQuestionIndex];
            progressEl.textContent = `幕次： ${currentQuestionIndex + 1} / ${questions.length}`;
            actTitleEl.textContent = currentQ.act;
            scenarioEl.innerHTML = `<strong>情境提問：</strong><br>${currentQ.scenario}`;
            
            optionsContainer.innerHTML = '';
            feedbackContainer.style.display = 'none';

            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, selectedBtn) {
            const currentQ = questions[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            
            // 停用所有按鈕
            allBtns.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQ.correct) {
                selectedBtn.classList.add('correct');
                feedbackContainer.style.backgroundColor = '#f4fce3';
                feedbackContainer.style.border = '2px solid var(--correct-color)';
                feedbackTitleEl.innerHTML = '✅ 選擇正確！';
                feedbackTitleEl.style.color = '#2b8a3e';
            } else {
                selectedBtn.classList.add('wrong');
                // 標示出正確答案
                allBtns[currentQ.correct].classList.add('correct');
                feedbackContainer.style.backgroundColor = '#fff5f5';
                feedbackContainer.style.border = '2px solid var(--wrong-color)';
                feedbackTitleEl.innerHTML = '❌ 選擇錯誤！';
                feedbackTitleEl.style.color = '#c92a2a';
            }

            explanationEl.innerHTML = currentQ.explanation;
            
            // 如果是最後一題，更改按鈕文字
            const nextBtn = document.getElementById('next-btn');
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.textContent = '看結局 🎬';
            } else {
                nextBtn.textContent = '下一幕 ➡️';
            }

            feedbackContainer.style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            gameContent.style.display = 'none';
            endScreen.style.display = 'block';
        }

        function restartGame() {
            currentQuestionIndex = 0;
            gameContent.style.display = 'block';
            endScreen.style.display = 'none';
            loadQuestion();
        }

        // 遊戲初始化
        window.onload = loadQuestion;
    </script>
</body>
</html>
