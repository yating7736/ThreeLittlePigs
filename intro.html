<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事山挑戰：引言</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">
    <div id="game-container" class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden relative min-h-[550px]">
        <div class="absolute inset-0 full-cover-bg flex flex-col items-center justify-end p-6 text-center">
            <div class="bg-white/80 backdrop-blur-sm p-8 rounded-2xl shadow-lg max-w-md w-full mb-8 border border-white/50 relative">
                <button onclick="window.location.href='index.html'" class="absolute top-4 left-4 text-gray-500 hover:text-gray-700 text-sm font-medium transition duration-200">
                    &larr; 返回
                </button>
                <h2 class="text-2xl font-bold text-gray-800 mb-4 mt-2">課前引言</h2>
                <p class="text-gray-700 text-sm md:text-base leading-relaxed mb-6 font-medium">
                    今天，我想來點不一樣的！<br>
                    各位同學一定聽過「故事山」吧！<br>
                    大家還記得「故事山」<br>
                    有哪些元素呢？
                </p>
                <button onclick="window.location.href='task.html'" class="bg-[#1da453] hover:bg-green-700 text-white font-bold py-3 px-10 rounded-full transition duration-300 shadow-md transform hover:scale-105">
                    開始挑戰
                </button>
            </div>
        </div>
    </div>
</body>
</html>
